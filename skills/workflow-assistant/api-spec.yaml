openapi: 3.0.0
info:
  title: 工作流编排系统 API
  version: 1.0.0
  description: |
    工作流编排系统的后端 API 接口定义。
    AI 助手通过这些接口管理工作流、配置节点参数、执行工作流。

servers:
  - url: http://localhost:8080
    description: 后端服务地址

paths:
  # ==================== 工作流管理 ====================

  /api/workflow/default:
    get:
      summary: 获取默认工作流
      description: 获取系统默认工作流的详细信息，包括节点、连线和关联
      operationId: getDefaultWorkflow
      responses:
        '200':
          description: 工作流详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'

  /api/workflow/{id}:
    get:
      summary: 获取工作流详情
      description: 根据ID获取工作流的详细信息，包括节点、连线和关联
      operationId: getWorkflow
      parameters:
        - name: id
          in: path
          required: true
          description: 工作流ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 工作流详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'

  /api/workflow/list:
    get:
      summary: 获取工作流列表
      description: 分页获取工作流列表
      operationId: getWorkflowList
      parameters:
        - name: page
          in: query
          description: 页码（从0开始）
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: 每页大小
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          description: 排序字段
          schema:
            type: string
            default: createdAt
        - name: direction
          in: query
          description: 排序方向
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
      responses:
        '200':
          description: 工作流分页列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkflowResponse'
                  totalElements:
                    type: integer
                  totalPages:
                    type: integer

  /api/workflow/search:
    get:
      summary: 搜索工作流
      description: 根据名称关键字搜索工作流
      operationId: searchWorkflows
      parameters:
        - name: name
          in: query
          required: true
          description: 名称关键字
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 搜索结果

  /api/workflow/{id}/data/json:
    post:
      summary: 保存工作流数据（JSON）
      description: |
        ## 接口说明

        此接口用于保存工作流的**完整数据**，采用**全量覆盖**的更新策略。

        ### 核心机制：全量覆盖

        **重要**：请求体中的 `nodes`、`connections`、`associations` 三个数组代表了工作流的**全部**数据，而非增量数据。
        后端收到请求后，会：
        1. 删除该工作流下所有旧的节点、连线、关联数据
        2. 插入请求体中传来的新数据

        ### 删除节点的实现方式

        删除节点**不需要单独的删除接口**，而是通过以下方式实现：
        - 前端从 `nodes` 数组中移除被删除的节点
        - 前端从 `connections` 数组中移除与该节点相关的连线
        - 前端从 `associations` 数组中移除相关关联（如有）
        - 调用此接口，传入剩余的完整数据
        - 后端全量覆盖，被"移除"的数据自然消失

        ### 数据结构说明

        - **nodes**: 工作流中的所有节点，包含节点的类型、位置、参数配置等
        - **connections**: 节点之间的连线关系，定义数据流向
        - **associations**: 特殊关联关系（如循环节点与循环体画布的关联）

        ### 注意事项

        1. 每次保存都必须传入**完整的**工作流数据
        2. 未包含在请求中的节点/连线将被删除
        3. 节点的 `nodeUuid` 是前端生成的唯一标识，用于更新时匹配节点
        4. 连线的 `connectionUuid` 同样由前端生成
      operationId: saveWorkflowData
      parameters:
        - name: id
          in: path
          required: true
          description: 工作流ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        description: 工作流完整数据（全量覆盖）
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowDataRequest'
            example:
              nodes:
                - nodeUuid: "node-start"
                  type: "start"
                  name: "开始"
                  positionX: 80
                  positionY: 303
                  inputPorts: "[]"
                  outputPorts: "[{\"id\":\"output-1\",\"name\":\"输出\"}]"
                  inputParams: "[]"
                  outputParams: "[{\"name\":\"dict\",\"type\":\"Dictionary\",\"required\":false,\"dictionaryType\":\"Demo数据字典\"}]"
                  config: "{}"
                  parentNodeUuid: null
                - nodeUuid: "node-text-clean"
                  type: "textClean"
                  name: "文本清洗"
                  positionX: 327
                  positionY: 406
                  inputPorts: "[{\"id\":\"input-1\",\"name\":\"输入\"}]"
                  outputPorts: "[{\"id\":\"output-1\",\"name\":\"输出\"}]"
                  inputParams: "[]"
                  outputParams: "[]"
                  config: "{\"inputType\":\"text\",\"textContent\":\"\",\"datasetId\":\"\",\"datasetFields\":[],\"removeExtraSpaces\":true,\"removeHtmlTags\":true,\"removeSpecialChars\":true,\"normalizeNewlines\":true,\"trimWhitespace\":true,\"standardizedNewlineChar\":true,\"trimFrontBack\":true,\"colsValue\":\"${开始.dict}.input\"}"
                  parentNodeUuid: null
                - nodeUuid: "node-table-extract"
                  type: "tableExtract"
                  name: "表格提取"
                  positionX: 395
                  positionY: 177
                  inputPorts: "[{\"id\":\"input-1\",\"name\":\"输入\"}]"
                  outputPorts: "[{\"id\":\"output-1\",\"name\":\"输出\"}]"
                  inputParams: "[{\"name\":\"file\",\"type\":\"File\",\"fileType\":\"Excel\",\"required\":true,\"description\":\"需要提取数据的Excel文件\"}]"
                  outputParams: "[{\"name\":\"output\",\"type\":\"Array\",\"elementType\":\"Object\",\"description\":\"提取的表格数据数组\"}]"
                  config: "{\"file\":null,\"sheetName\":\"\",\"headerRow\":1,\"startRow\":2,\"endRow\":null,\"columns\":[],\"inputFileValue\":\"${文本清洗.output}\"}"
                  parentNodeUuid: null
                - nodeUuid: "node-loop"
                  type: "loop"
                  name: "循环"
                  positionX: 775
                  positionY: 250
                  inputPorts: "[{\"id\":\"input-1\",\"name\":\"输入\"}]"
                  outputPorts: "[{\"id\":\"output-1\",\"name\":\"输出\"}]"
                  inputParams: "[]"
                  outputParams: "[{\"name\":\"current_item\",\"type\":\"Any\"},{\"name\":\"current_index\",\"type\":\"Number\"}]"
                  config: "{\"loopOutputParams\":[{\"id\":\"loop-out-1774449139984\",\"name\":\"content\",\"elementType\":\"String\",\"value\":\"${HTTPS/HTTP接口调用.choices.message.content}\"}],\"cycle_array\":\"${表格提取.output}\"}"
                  parentNodeUuid: null
                - nodeUuid: "node-judge-model"
                  type: "judgeModel"
                  name: "裁判模型"
                  positionX: 1025
                  positionY: 250
                  inputPorts: "[{\"id\":\"input-1\",\"name\":\"输入\"}]"
                  outputPorts: "[{\"id\":\"output-1\",\"name\":\"输出\"}]"
                  inputParams: "[]"
                  outputParams: "[]"
                  config: "{\"modelValue\":\"DeepSeekR1-32B\",\"promptValue\":\"你是一个专业的AI输出质量评估专家...\",\"toEvaluateValue\":\"${循环.content}\",\"toEvaluateType\":\"Array<String>\"}"
                  parentNodeUuid: null
                - nodeUuid: "node-table-generate"
                  type: "tableGenerate"
                  name: "表格生成"
                  positionX: 1230
                  positionY: 135
                  inputPorts: "[{\"id\":\"input-1\",\"name\":\"输入\"}]"
                  outputPorts: "[{\"id\":\"output-1\",\"name\":\"输出\"}]"
                  inputParams: "[]"
                  outputParams: "[]"
                  config: "{\"inputParams\":[{\"name\":\"input\",\"type\":\"Array\",\"value\":\"${裁判模型.output}\",\"elementType\":\"String\"}],\"tableGenerateInputParam_0\":\"${裁判模型.output}\"}"
                  parentNodeUuid: null
                - nodeUuid: "node-end"
                  type: "end"
                  name: "结束"
                  positionX: 1525
                  positionY: 249
                  inputPorts: "[{\"id\":\"input-1\",\"name\":\"输入\"}]"
                  outputPorts: "[]"
                  inputParams: "[]"
                  outputParams: "[]"
                  config: "{\"inputParams\":[{\"name\":\"output\",\"type\":\"File<Excel>\",\"value\":\"${表格生成.output_excel}\"}],\"endInputParam_0\":\"${表格生成.output_excel}\"}"
                  parentNodeUuid: null
                - nodeUuid: "node-loop-body"
                  type: "loopBodyCanvas"
                  name: "循环体"
                  positionX: 358
                  positionY: 588
                  inputPorts: "[]"
                  outputPorts: "[]"
                  inputParams: "[]"
                  outputParams: "[]"
                  config: "{\"width\":500,\"height\":400,\"belongsTo\":\"node-loop\",\"loopBody\":{\"canvas\":{\"scale\":1,\"offsetX\":-3,\"offsetY\":-70},\"nodes\":[{\"id\":\"node-api-auto-1\",\"type\":\"apiAuto\",\"name\":\"HTTPS/HTTP接口调用\",\"x\":200,\"y\":150,\"inputs\":[{\"id\":\"input-1\",\"name\":\"输入\"}],\"outputs\":[{\"id\":\"output-1\",\"name\":\"输出\"}],\"inputParams\":[],\"outputParams\":[],\"config\":{\"url\":\"\",\"method\":\"GET\",\"headers\":[],\"body\":\"\",\"timeout\":30000}}],\"connections\":[{\"id\":\"conn-left-to-api\",\"sourceId\":\"port-left\",\"sourcePort\":\"out\",\"targetId\":\"node-api-auto-1\",\"targetPort\":\"input-1\"},{\"id\":\"conn-api-to-right\",\"sourceId\":\"node-api-auto-1\",\"sourcePort\":\"output-1\",\"targetId\":\"port-right\",\"targetPort\":\"in\"}],\"leftPort\":{\"id\":\"port-left\",\"name\":\"输入\",\"type\":\"input\",\"y\":200,\"params\":[]},\"rightPort\":{\"id\":\"port-right\",\"name\":\"输出\",\"type\":\"output\",\"y\":200,\"params\":[]}}}"
                  parentNodeUuid: null
              connections:
                - connectionUuid: "37ec2fbc-43bb-4a02-bcdc-28788790862e"
                  sourceNodeUuid: "node-start"
                  sourcePortId: "output-1"
                  targetNodeUuid: "node-text-clean"
                  targetPortId: "input-1"
                  sourceParamIndex: null
                  targetParamIndex: null
                  label: null
                - connectionUuid: "3613f82c-a40a-41ca-935a-426c4cd3c46d"
                  sourceNodeUuid: "node-text-clean"
                  sourcePortId: "output-1"
                  targetNodeUuid: "node-table-extract"
                  targetPortId: "input-1"
                  sourceParamIndex: null
                  targetParamIndex: null
                  label: null
                - connectionUuid: "0aec7f6b-e5e9-4d4b-8d5a-6957fa5e575a"
                  sourceNodeUuid: "node-table-extract"
                  sourcePortId: "output-1"
                  targetNodeUuid: "node-loop"
                  targetPortId: "input-1"
                  sourceParamIndex: null
                  targetParamIndex: null
                  label: null
                - connectionUuid: "74d95872-2a7e-4719-906a-17f90603ca79"
                  sourceNodeUuid: "node-loop"
                  sourcePortId: "output-1"
                  targetNodeUuid: "node-judge-model"
                  targetPortId: "input-1"
                  sourceParamIndex: null
                  targetParamIndex: null
                  label: null
                - connectionUuid: "b0976b4c-c442-4d7f-aff4-1880a629361d"
                  sourceNodeUuid: "node-judge-model"
                  sourcePortId: "output-1"
                  targetNodeUuid: "node-table-generate"
                  targetPortId: "input-1"
                  sourceParamIndex: null
                  targetParamIndex: null
                  label: null
                - connectionUuid: "686c38bf-45db-47c2-8a16-94593d08ae0b"
                  sourceNodeUuid: "node-table-generate"
                  sourcePortId: "output-1"
                  targetNodeUuid: "node-end"
                  targetPortId: "input-1"
                  sourceParamIndex: null
                  targetParamIndex: null
                  label: null
              associations:
                - loopNodeUuid: "node-loop"
                  bodyNodeUuid: "node-loop-body"
                  associationType: "loop-body"
      responses:
        '200':
          description: 保存成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'

  /api/workflow/{id}/publish:
    post:
      summary: 发布工作流
      description: 将工作流状态设置为已发布
      operationId: publishWorkflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 发布成功

  /api/workflow/{id}/copy:
    post:
      summary: 复制工作流
      description: 复制一个工作流及其所有节点、连线和关联
      operationId: copyWorkflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: 复制成功

  # ==================== 节点类型 ====================

  /api/workflow/node-types:
    get:
      summary: 获取所有节点类型
      description: 获取所有启用的节点类型列表，包含每个节点类型的参数定义（inputParams、outputParams、defaultConfig）
      operationId: getAllNodeTypes
      responses:
        '200':
          description: 节点类型列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NodeTypeResponse'

  /api/workflow/node-types/code/{code}:
    get:
      summary: 根据编码获取节点类型
      description: 根据节点类型编码获取详细信息
      operationId: getNodeTypeByCode
      parameters:
        - name: code
          in: path
          required: true
          description: 节点类型编码
          schema:
            type: string
      responses:
        '200':
          description: 节点类型详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeTypeResponse'

  /api/workflow/node-types/category/{category}:
    get:
      summary: 根据分类获取节点类型
      description: 根据分类获取节点类型列表
      operationId: getNodeTypesByCategory
      parameters:
        - name: category
          in: path
          required: true
          description: 分类名称
          schema:
            type: string
      responses:
        '200':
          description: 节点类型列表

  # ==================== 工作流执行 ====================

  /api/workflow/{id}/execute:
    post:
      summary: 执行工作流
      description: 触发工作流的执行
      operationId: executeWorkflow
      parameters:
        - name: id
          in: path
          required: true
          description: 工作流ID
          schema:
            type: integer
            format: int64
        - name: triggeredBy
          in: query
          description: 触发人
          schema:
            type: string
      requestBody:
        description: 输入数据（JSON格式）
        content:
          application/json:
            schema:
              type: object
              description: 工作流输入参数
      responses:
        '200':
          description: 执行记录ID
          content:
            application/json:
              schema:
                type: integer
                format: int64

  /api/workflow/execution/{id}:
    get:
      summary: 获取执行记录
      description: 根据ID获取执行记录详情
      operationId: getExecution
      parameters:
        - name: id
          in: path
          required: true
          description: 执行记录ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 执行记录详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionResponse'

  /api/workflow/{workflowId}/executions:
    get:
      summary: 获取工作流执行记录列表
      description: 获取指定工作流的所有执行记录
      operationId: getWorkflowExecutions
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 执行记录列表

  /api/workflow/execution/{id}/abort:
    post:
      summary: 中止执行
      description: 中止正在执行的工作流
      operationId: abortExecution
      parameters:
        - name: id
          in: path
          required: true
          description: 执行记录ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 中止成功

components:
  schemas:
    WorkflowResponse:
      type: object
      description: 工作流响应
      properties:
        id:
          type: integer
          format: int64
          description: 工作流ID
        name:
          type: string
          description: 工作流名称
        description:
          type: string
          description: 工作流描述
        published:
          type: boolean
          description: 是否已发布
        hasRun:
          type: boolean
          description: 是否已运行
        version:
          type: integer
          description: 版本号
        status:
          type: string
          enum: [DRAFT, PUBLISHED, ARCHIVED]
          description: 状态
        nodes:
          type: array
          description: 节点列表
          items:
            $ref: '#/components/schemas/NodeDTO'
        connections:
          type: array
          description: 连线列表
          items:
            $ref: '#/components/schemas/ConnectionDTO'
        associations:
          type: array
          description: 关联列表
          items:
            $ref: '#/components/schemas/AssociationDTO'

    NodeDTO:
      type: object
      description: |
        节点信息

        节点是工作流的基本组成单元，代表一个处理步骤。每个节点包含：
        - 唯一标识（nodeUuid）
        - 节点类型（type）
        - 位置信息（positionX, positionY）
        - 端口配置（inputPorts, outputPorts）
        - 参数定义（inputParams, outputParams）
        - 运行时配置（config）

        **注意**：`inputPorts`、`outputPorts`、`inputParams`、`outputParams`、`config` 字段都是 JSON 字符串格式。
      properties:
        id:
          type: integer
          format: int64
          description: 节点数据库ID（后端生成，保存时无需传入）
        nodeUuid:
          type: string
          description: |
            节点UUID，由前端生成的唯一标识符。
            在全量更新时，后端通过此字段匹配和更新节点。
            格式示例：`node-start`、`node-loop`、`node-text-clean`
        type:
          type: string
          description: |
            节点类型编码，常见类型：
            - `start`: 开始节点，定义工作流输入参数
            - `end`: 结束节点，定义工作流输出
            - `loop`: 循环节点，遍历数组执行循环体
            - `loopBodyCanvas`: 循环体画布，包含循环内部节点
            - `textClean`: 文本清洗节点
            - `tableExtract`: 表格提取节点
            - `tableGenerate`: 表格生成节点
            - `judgeModel`: 裁判模型节点
            - `apiAuto`: API调用节点
        name:
          type: string
          description: 节点名称，用于显示和变量引用（如 `${开始.output}`）
        positionX:
          type: integer
          description: 节点在画布上的X坐标
        positionY:
          type: integer
          description: 节点在画布上的Y坐标
        inputPorts:
          type: string
          description: |
            输入端口配置，JSON字符串格式。
            定义节点接收数据的端口。
            示例：`[{"id":"input-1","name":"输入"}]`
        outputPorts:
          type: string
          description: |
            输出端口配置，JSON字符串格式。
            定义节点输出数据的端口。
            示例：`[{"id":"output-1","name":"输出"}]`
        inputParams:
          type: string
          description: |
            输入参数定义，JSON字符串格式。
            定义节点需要的外部输入参数（非通过连线传入）。
            示例：`[{"name":"file","type":"File","fileType":"Excel","required":true}]`
        outputParams:
          type: string
          description: |
            输出参数定义，JSON字符串格式。
            定义节点执行后产出的参数，可被后续节点引用。
            示例：`[{"name":"output","type":"Array","elementType":"Object"}]`
        config:
          type: string
          description: |
            节点运行时配置，JSON字符串格式。
            包含节点执行所需的具体参数值，支持变量引用。
            示例：`{"inputType":"text","removeExtraSpaces":true,"colsValue":"${开始.dict}.input"}`
        parentNodeUuid:
          type: string
          nullable: true
          description: |
            父节点UUID，用于嵌套节点（如循环体内部的节点指向循环体画布）。
            顶级节点此值为 null。

    ConnectionDTO:
      type: object
      description: |
        连线信息

        连线定义节点之间的数据流向。从源节点的输出端口连接到目标节点的输入端口。
        连线的唯一标识（connectionUuid）由前端生成。
      properties:
        id:
          type: integer
          format: int64
          description: 连线数据库ID（后端生成，保存时无需传入）
        connectionUuid:
          type: string
          description: |
            连线UUID，由前端生成的唯一标识符。
            格式示例：`37ec2fbc-43bb-4a02-bcdc-28788790862e`
        sourceNodeUuid:
          type: string
          description: 源节点UUID（数据流出方）
        sourcePortId:
          type: string
          description: 源节点的输出端口ID
        targetNodeUuid:
          type: string
          description: 目标节点UUID（数据流入方）
        targetPortId:
          type: string
          description: 目标节点的输入端口ID
        sourceParamIndex:
          type: integer
          nullable: true
          description: 源参数索引（用于多输出参数场景）
        targetParamIndex:
          type: integer
          nullable: true
          description: 目标参数索引（用于多输入参数场景）
        label:
          type: string
          nullable: true
          description: 连线标签（可选）

    AssociationDTO:
      type: object
      description: |
        关联信息

        用于定义节点之间的特殊关联关系，目前主要用于：
        - 循环节点（loop）与循环体画布（loopBodyCanvas）的关联

        当删除循环节点时，需要同时删除关联的循环体画布。
      properties:
        id:
          type: integer
          format: int64
          description: 关联数据库ID（后端生成，保存时无需传入）
        loopNodeUuid:
          type: string
          description: 循环节点的UUID（关联的发起方）
        bodyNodeUuid:
          type: string
          description: 循环体画布节点的UUID（关联的目标方）
        associationType:
          type: string
          description: |
            关联类型，目前支持：
            - `loop-body`: 表示循环节点与循环体画布的关联

    NodeTypeResponse:
      type: object
      description: 节点类型响应
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
          description: 节点类型编码（如 start, end, llm_chat, text_cleaner 等）
        name:
          type: string
          description: 节点类型名称
        category:
          type: string
          description: 分类
        description:
          type: string
          description: 描述
        defaultConfig:
          type: string
          description: 默认配置（JSON格式）
        inputPorts:
          type: string
          description: 默认输入端口（JSON格式）
        outputPorts:
          type: string
          description: 默认输出端口（JSON格式）

    WorkflowDataRequest:
      type: object
      description: |
        工作流数据请求

        **重要**：此请求体包含工作流的**完整数据**，采用**全量覆盖**策略更新。

        ### 核心原则

        1. **全量覆盖**：后端收到请求后，会先删除该工作流的所有旧数据，再插入新数据
        2. **原子操作**：整个保存过程在事务中执行，保证数据一致性
        3. **前端生成UUID**：`nodeUuid` 和 `connectionUuid` 由前端生成，用于节点匹配

        ### 删除逻辑

        要删除某个节点，只需在 `nodes` 数组中不包含该节点即可。
        后端全量覆盖后，未包含的节点自然被删除。

        ### 数据完整性

        保存时需确保：
        - `connections` 中引用的节点UUID都存在于 `nodes` 中
        - `associations` 中引用的节点UUID都存在于 `nodes` 中
      properties:
        nodes:
          type: array
          description: |
            节点列表（完整）。

            包含工作流中的所有节点。保存时传入的数组会**完全替换**原有的节点数据。
            未包含在此数组中的节点将被删除。
          items:
            $ref: '#/components/schemas/NodeDTO'
        connections:
          type: array
          description: |
            连线列表（完整）。

            包含工作流中的所有连线。保存时传入的数组会**完全替换**原有的连线数据。
            未包含在此数组中的连线将被删除。
          items:
            $ref: '#/components/schemas/ConnectionDTO'
        associations:
          type: array
          description: |
            关联列表（完整）。

            包含工作流中的所有关联关系。保存时传入的数组会**完全替换**原有的关联数据。
          items:
            $ref: '#/components/schemas/AssociationDTO'

    ExecutionResponse:
      type: object
      description: 执行记录响应
      properties:
        id:
          type: integer
          format: int64
          description: 执行记录ID
        uuid:
          type: string
          description: 执行UUID
        workflowId:
          type: integer
          format: int64
          description: 工作流ID
        status:
          type: string
          enum: [RUNNING, COMPLETED, FAILED, ABORTED]
          description: 执行状态
        inputData:
          type: string
          description: 输入数据（JSON格式）
        outputData:
          type: string
          description: 输出数据（JSON格式）
        errorMessage:
          type: string
          description: 错误信息
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
