server:
  port: 8080

spring:
  application:
    name: ai-test-platform

  # MySQL数据库配置
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ai_test_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2数据库配置 (开发环境 - 已禁用)
  # h2:
  #   console:
  #     enabled: true
  #     path: /h2-console

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  # RabbitMQ配置 (可选，默认禁用)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# 异步任务配置
task:
  executor:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
    keep-alive-seconds: 60

# 日志配置
logging:
  level:
    com.example.demo: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.amqp: INFO

# SpringDoc配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
